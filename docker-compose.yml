services:

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  ingestion:
    build: ./ingestion_service
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./data:/data

  processing:
    build: ./processing_service
    depends_on:
      - postgres
    env_file:
      - .env

  serving:
    build: ./serving_service
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres